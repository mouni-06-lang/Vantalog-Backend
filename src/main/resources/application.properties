spring.application.name=vantalog-spring-backend
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:Vantalog_bd}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.sql.init.encoding=UTF-8

logging.level.org.springframework.security=ERROR

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.jwt-secret=${JWT_SECRET}
app.jwt-expiration-ms=${JWT_EXPIRATION_MS:604800000}
app.seed-default-admin=${APP_SEED_DEFAULT_ADMIN:false}
app.default-admin-name=${DEFAULT_ADMIN_NAME:}
app.default-admin-email=${DEFAULT_ADMIN_EMAIL:}
app.default-admin-password=${DEFAULT_ADMIN_PASSWORD:}
app.upload-dir=${APP_UPLOAD_DIR:${user.dir}/uploads}
